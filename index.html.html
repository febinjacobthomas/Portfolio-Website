<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Febin Jacob Thomas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;cursor:none;}

#welcome{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:#000;overflow:hidden;
}
canvas{position:absolute;inset:0;z-index:0;}

.w-vignette{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.75) 100%);
}
.ring-wrap{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.ring{position:absolute;border-radius:50%;border-style:solid;}
.ring-1{width:520px;height:520px;border-width:1px;border-color:rgba(245,180,50,0.18);animation:spinCW 18s linear infinite;}
.ring-2{width:640px;height:640px;border-width:1px;border-color:rgba(232,58,58,0.12);animation:spinCCW 24s linear infinite;border-style:dashed;}
.ring-3{width:760px;height:760px;border-width:1px;border-color:rgba(255,120,30,0.08);animation:spinCW 36s linear infinite;}
.ring-dot{position:absolute;width:6px;height:6px;border-radius:50%;}
.ring-dot.gold{background:#f5c842;box-shadow:0 0 12px #f5c842,0 0 30px #f5c842;}
.ring-dot.red{background:#e83a3a;box-shadow:0 0 12px #e83a3a,0 0 30px #e83a3a;}
@keyframes spinCW{to{transform:rotate(360deg);}}
@keyframes spinCCW{to{transform:rotate(-360deg);}}

.w-center{position:relative;z-index:4;text-align:center;display:flex;flex-direction:column;align-items:center;gap:0;}

.w-eyebrow{
  font-family:'Share Tech Mono',monospace;font-size:clamp(0.65rem,1.5vw,0.85rem);
  letter-spacing:0.55em;color:rgba(245,200,66,0.6);text-transform:uppercase;
  opacity:0;animation:wFade 1s ease 0.4s forwards;margin-bottom:18px;
}
.w-title-wrap{position:relative;opacity:0;transform:translateY(40px) scale(0.96);animation:wRise 1.1s cubic-bezier(0.16,1,0.3,1) 0.8s forwards;}
.w-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,12vw,10.5rem);color:#fff;letter-spacing:0.05em;line-height:0.92;position:relative;z-index:1;}
.w-title-r,.w-title-b{position:absolute;top:0;left:0;width:100%;font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,12vw,10.5rem);letter-spacing:0.05em;line-height:0.92;pointer-events:none;}
.w-title-r{color:#f5c842;opacity:0.45;animation:chromR 3s ease-in-out 2s infinite;}
.w-title-b{color:#e83a3a;opacity:0.35;animation:chromB 3s ease-in-out 2s infinite;}
@keyframes chromR{0%,100%{clip-path:none;transform:translate(0);}30%{clip-path:polygon(0 15%,100% 15%,100% 35%,0 35%);transform:translate(-3px,0);}60%{clip-path:polygon(0 60%,100% 60%,100% 75%,0 75%);transform:translate(3px,0);}}
@keyframes chromB{0%,100%{clip-path:none;transform:translate(0);}30%{clip-path:polygon(0 40%,100% 40%,100% 55%,0 55%);transform:translate(3px,0);}60%{clip-path:polygon(0 20%,100% 20%,100% 30%,0 30%);transform:translate(-3px,0);}}

.w-name2{font-family:'Cinzel',serif;font-size:clamp(0.9rem,2.5vw,1.6rem);color:#f0ead8;letter-spacing:0.4em;font-weight:400;opacity:0;transform:translateY(20px);animation:wRise 1s ease 1.5s forwards;margin-top:14px;text-transform:uppercase;}
.w-fireline{width:0;height:2px;background:linear-gradient(90deg,transparent,#f5c842,#ff6b35,#e83a3a,transparent);box-shadow:0 0 12px #f5c842;animation:fireLine 0.8s ease 1.2s forwards;margin:20px 0;}
@keyframes fireLine{to{width:min(600px,80vw);}}
.w-sub{font-family:'Share Tech Mono',monospace;font-size:clamp(0.65rem,1.5vw,0.78rem);color:#e83a3a;letter-spacing:0.5em;text-transform:uppercase;text-shadow:0 0 14px rgba(232,58,58,0.6);opacity:0;animation:wFade 1s ease 1.8s forwards;}

.w-loader{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);width:200px;opacity:0;animation:wFade 0.5s ease 2s forwards;}
.w-loader-top{display:flex;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:rgba(245,200,66,0.4);letter-spacing:0.2em;margin-bottom:8px;}
.w-track{height:1px;background:rgba(245,200,66,0.1);}
.w-fill{height:100%;width:0;background:linear-gradient(90deg,#c9962a,#f5c842,#ff6b35,#e83a3a);animation:wFill 2.5s linear 2s forwards;box-shadow:0 0 6px #f5c842;}

.w-skip{
  position:absolute;bottom:16px;right:24px;z-index:10;
  font-family:'Share Tech Mono',monospace;font-size:0.65rem;
  color:rgba(245,200,66,0.6);letter-spacing:0.2em;
  background:transparent;border:1px solid rgba(245,200,66,0.25);
  padding:8px 18px;border-radius:3px;cursor:pointer;
  opacity:0;animation:wFade 0.5s ease 1.5s forwards;
  transition:all 0.2s;
}
.w-skip:hover{color:#f5c842;border-color:rgba(245,200,66,0.7);}

@keyframes wFade{to{opacity:1;}}
@keyframes wRise{to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes wFill{to{width:100%;}}
</style>
</head>
<body>
<div id="welcome">
  <canvas id="wCanvas"></canvas>
  <div class="w-vignette"></div>
  <div class="ring-wrap">
    <div class="ring ring-3"></div>
    <div class="ring ring-2"><div class="ring-dot red" style="position:absolute;top:-3px;left:50%;transform:translateX(-50%);"></div></div>
    <div class="ring ring-1"><div class="ring-dot gold" style="position:absolute;bottom:-3px;left:50%;transform:translateX(-50%);"></div></div>
  </div>
  <div class="w-center">
    <div class="w-eyebrow">Welcome To</div>
    <div class="w-title-wrap">
      <div class="w-title-r" aria-hidden="true">FEBIN JACOB<br>THOMAS</div>
      <div class="w-title-b" aria-hidden="true">FEBIN JACOB<br>THOMAS</div>
      <div class="w-title">FEBIN JACOB<br>THOMAS</div>
    </div>
    <div class="w-fireline"></div>
    <div class="w-name2">Portfolio Webpage</div>
    <div class="w-sub" style="margin-top:10px;">Data Analyst &nbsp;|&nbsp; UI/UX Designer</div>
  </div>
  <div class="w-loader">
    <div class="w-loader-top"><span>Loading</span><span id="wPct">0%</span></div>
    <div class="w-track"><div class="w-fill"></div></div>
  </div>
  <button class="w-skip" onclick="go()">SKIP ↗</button>
</div>

<script>
var gone = false;
function go(){
  if(gone) return; gone = true;
  window.location.href = 'main.html';
}
document.getElementById('welcome').addEventListener('click', go);

// Canvas
var wc = document.getElementById('wCanvas');
var cx = wc.getContext('2d');
wc.width = window.innerWidth; wc.height = window.innerHeight;
var fS=15, cols=Math.floor(wc.width/fS), drops=[];
for(var i=0;i<cols;i++) drops[i]=1;
var chars='01FEBIN<>{}#@!フェビン&*';
var sparks=[];
for(var s=0;s<200;s++) sparks.push({x:Math.random()*wc.width,y:Math.random()*wc.height,r:Math.random()*1.5+0.3,vy:-(Math.random()*0.8+0.2),vx:(Math.random()-.5)*0.4,a:Math.random()*0.5+0.1,h:Math.random()*45+10});

function drawW(){
  cx.fillStyle='rgba(0,0,0,0.065)';
  cx.fillRect(0,0,wc.width,wc.height);
  cx.font=fS+"px 'Share Tech Mono',monospace";
  for(var i=0;i<drops.length;i++){
    var ch=chars[Math.floor(Math.random()*chars.length)];
    var bright=Math.random()>.965;
    cx.fillStyle=bright?'rgba(245,200,66,0.95)':i%3===0?'rgba(232,58,58,0.13)':'rgba(245,200,66,0.07)';
    cx.fillText(ch,i*fS,drops[i]*fS);
    if(drops[i]*fS>wc.height&&Math.random()>.975) drops[i]=0;
    drops[i]++;
  }
  for(var j=0;j<sparks.length;j++){
    var p=sparks[j];
    cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);
    cx.fillStyle='hsla('+p.h+',100%,65%,'+p.a+')';cx.fill();
    p.y+=p.vy;p.x+=p.vx;
    if(p.y<0){p.y=wc.height;p.x=Math.random()*wc.width;}
  }
}
setInterval(drawW,40);

// pct counter
var pct=0;
var pi=setInterval(function(){
  pct=Math.min(pct+Math.floor(Math.random()*5)+1,100);
  var el=document.getElementById('wPct');
  if(el) el.textContent=pct+'%';
  if(pct>=100) clearInterval(pi);
},30);

// Auto go after 3.5s
setTimeout(go, 3500);
window.addEventListener('resize',function(){wc.width=window.innerWidth;wc.height=window.innerHeight;});
</script>
</body>
</html>
